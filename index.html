      { name: "Bottle Emerald", hex: "#045D45" },
      { name: "Electric Orchid", hex: "#C0328E" },
      { name: "Glacier Blue", hex: "#A9C4E0" },
      { name: "Fresh Snow", hex: "#FBFBFA" },
      { name: "Ink Black", hex: "#131313" },
      { name: "Polished Silver", hex: "#B7B9BB" },
      { name: "Deep Amethyst", hex: "#6E3B75" },
      { name: "Cobalt Sky", hex: "#1E4C9A" },
      { name: "Winter Cherry", hex: "#8E1537" },

    ],

    ],
    avoidNote: "warm, muted tones mud against your cool clarity",
  },
  summer: {
    name: "Summer",
    accent: "#8C6A78",
    tagline: "Cool undertones softened by low contrast and quiet colour.",
    description:
      "Your colouring is gentle — hair and skin sit close in depth. Powdery, blue-based shades feel like an extension of you; anything bright or golden overpowers.",
    palette: [
      { name: "Dusty Rose", hex: "#C48A94" },
      { name: "Soft Lavender", hex: "#A79BC4" },

      { name: "Faded Sage", hex: "#93A78C" },
      { name: "Antique Mauve", hex: "#8C6A78" },
      { name: "Muted Navy", hex: "#3E4A61" },
      { name: "Rose Grey", hex: "#B9A6A1" },
      { name: "Periwinkle", hex: "#8992C4" },
      { name: "Seafoam", hex: "#8FBBAB" },
      { name: "Soft Plum", hex: "#6E4A5D" },
      { name: "Pearl Grey", hex: "#D6D2CE" },
      { name: "Blueberry", hex: "#55617A" },
    ],
    avoid: [
      { name: "Tomato", hex: "#D94F30" },
      { name: "Marigold", hex: "#E2762D" },
      { name: "Bright Yellow", hex: "#E9C13B" },
      { name: "Chartreuse", hex: "#B7C232" },
    ],

  },
  spring: {

    tagline: "Warm undertones lit up by clarity and light.",
    description:
      "Your colouring is bright and golden with real light in it. Clear, warm colour makes you glow; anything dusty or cool flattens that light.",
    palette: [
      { name: "Living Coral", hex: "#F0754C" },
      { name: "Sunlit Peach", hex: "#F3B78C" },
      { name: "Buttercup", hex: "#F0C93B" },

      { name: "Warm Ivory", hex: "#FBF3E1" },
      { name: "Golden Camel", hex: "#D9A45E" },
      { name: "Watermelon", hex: "#F27C8D" },
      { name: "Spring Aqua", hex: "#4FBFB0" },
      { name: "Marigold", hex: "#E8933B" },
      { name: "Apple Green", hex: "#8CBF4E" },
      { name: "Warm Chestnut", hex: "#A9622F" },
    ],
    avoid: [
      { name: "Dove Grey", hex: "#A6A6A6" },
      { name: "Deep Plum", hex: "#5A3A52" },
      { name: "Navy", hex: "#29344A" },
      { name: "Rose Grey", hex: "#A98F92" },
    ],
    avoidNote: "cool, dusty tones dim a warm, high-clarity glow",
  },
  autumn: {
    name: "Autumn",
    accent: "#A6521F",
    tagline: "Warm undertones deepened by richness and muted warmth.",
    description:
      "Your colouring runs warm and rich, with soft rather than sharp contrast. Earthy, spiced colour feels grounded on you; anything icy or neon fights your warmth.",
    palette: [
      { name: "Burnished Rust", hex: "#A6521F" },
      { name: "Deep Olive", hex: "#6E6B3A" },
      { name: "Aged Mustard", hex: "#C9962F" },
      { name: "Terracotta", hex: "#B5603A" },
      { name: "Dark Chocolate", hex: "#5A3A24" },
      { name: "Warm Camel", hex: "#B98F5E" },
      { name: "Forest Green", hex: "#3E5A34" },
      { name: "Brick Red", hex: "#9C4A34" },
      { name: "Amber Glow", hex: "#C97D2E" },
      { name: "Moss", hex: "#6B7A4A" },
      { name: "Copper", hex: "#B5651D" },
      { name: "Espresso", hex: "#3B2A20" },
    ],
    avoid: [
      { name: "Icy Pink", hex: "#F0C8D6" },
      { name: "Electric Orchid", hex: "#C0328E" },
      { name: "Fresh Snow", hex: "#FBFBFA" },

  },

/* --------------------------------- helpers --------------------------------- */

const clamp = (n, min, max) => Math.min(max, Math.max(min, n));

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  const d = max - min;
  if (d !== 0) {
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      default: h = (r - g) / d + 4;
    }
    h /= 6;
  }
  return [h, s, l];
}

/* --------------------------------- meter ui --------------------------------- */

function Meter({ left, right, value, accent }) {
  return (
    <div className="meter">
      <div className="meter-track">
        <div
          className="meter-dot"
          style={{ left: `${clamp(value, 3, 97)}%`, background: accent }}
        />
      </div>
      <div className="meter-labels">
        <span>{left}</span>
        <span>{right}</span>
      </div>
    </div>
  );
}

/* ---------------------------------- app ---------------------------------- */

function ColourLab() {
  const [stage, setStage] = useState("upload");
  const [imageSrc, setImageSrc] = useState(null);
  const [metrics, setMetrics] = useState(null);
  const [seasonKey, setSeasonKey] = useState(null);
  const [depthLabel, setDepthLabel] = useState("");
  const [activeSwatch, setActiveSwatch] = useState(null);
  const [dragOver, setDragOver] = useState(false);

  const canvasRef = useRef(null);
  const fileInputRef = useRef(null);

  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      setImageSrc(e.target.result);
      setStage("analyzing");
      window.setTimeout(() => analyze(e.target.result), 60);
    };
    reader.readAsDataURL(file);
  };

  const analyze = (src) => {
    const img = new window.Image();
    img.onload = () => {
      const canvas = canvasRef.current;
      const W = 300, H = 400;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext("2d");
      const scale = Math.max(W / img.width, H / img.height);
      const drawW = img.width * scale, drawH = img.height * scale;
      const offX = (W - drawW) / 2, offY = (H - drawH) / 2;
      ctx.drawImage(img, offX, offY, drawW, drawH);

      const sample = (fx, fy) => {
        const x = Math.round(fx * W), y = Math.round(fy * H);
        const r = 5;
        const sx = clamp(x - r, 0, W - r * 2);
        const sy = clamp(y - r, 0, H - r * 2);
        const data = ctx.getImageData(sx, sy, r * 2, r * 2).data;
        let rs = 0, gs = 0, bs = 0, c = 0;
        for (let i = 0; i < data.length; i += 4) {
          rs += data[i]; gs += data[i + 1]; bs += data[i + 2]; c++;
        }
        return { r: rs / c, g: gs / c, b: bs / c };
      };

      const forehead = sample(0.5, 0.3);
      const cheekL = sample(0.32, 0.55);
      const cheekR = sample(0.68, 0.55);
      const chin = sample(0.5, 0.75);
      const hairTop = sample(0.5, 0.08);
      const hairSide = sample(0.18, 0.22);

      const avg = (arr) => ({
        r: arr.reduce((s, c) => s + c.r, 0) / arr.length,
        g: arr.reduce((s, c) => s + c.g, 0) / arr.length,
        b: arr.reduce((s, c) => s + c.b, 0) / arr.length,
      });

      const skin = avg([forehead, cheekL, cheekR, chin]);
      const hair = avg([hairTop, hairSide]);

      const lum = (c) => (0.299 * c.r + 0.587 * c.g + 0.114 * c.b) / 255 * 100;
      const skinLum = lum(skin);
      const hairLum = lum(hair);
      const depthScore = clamp(skinLum * 0.7 + hairLum * 0.3, 0, 100);

      const warmthRaw = skin.r - skin.b;
      const warmthScore = clamp(((warmthRaw - 20) / (90 - 20)) * 100, 0, 100);

      const [, skinSat] = rgbToHsl(skin.r, skin.g, skin.b);
      const contrastDiff = Math.abs(skinLum - hairLum);
      const chromaScore = clamp(skinSat * 100 * 0.5 + contrastDiff * 0.9, 0, 100);

      const isWarm = warmthScore >= 50;
      const isClear = chromaScore >= 50;
      const sKey = isWarm ? (isClear ? "spring" : "autumn") : (isClear ? "winter" : "summer");
      const dLabel = depthScore >= 62 ? "Light" : depthScore <= 42 ? "Deep" : "True";

      setMetrics({ warmthScore, depthScore, chromaScore });
      setSeasonKey(sKey);
      setDepthLabel(dLabel);
      setActiveSwatch(SEASONS[sKey].palette[0]);
      window.setTimeout(() => setStage("result"), 1100);
    };
    img.src = src;
  };

  const reset = () => {
    setStage("upload");
    setImageSrc(null);
    setMetrics(null);
    setSeasonKey(null);
    setActiveSwatch(null);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  const season = seasonKey ? SEASONS[seasonKey] : null;

  return (
    <div className="lab">
      <div className="inner">
        <div className="brandrow">
          <div className="brand"><IconPipette size={14} strokeWidth={1.75} /> Colour Lab</div>
          {stage === "result" && (
            <button className="btn-ghost" onClick={reset}>
              <IconRotate size={12} strokeWidth={2} /> Start over
            </button>
          )}
        </div>

        {stage === "upload" && (
          <React.Fragment>
            <div className="eyebrow">A private colour laboratory</div>
            <h1 className="display">Find the palette<br/>your skin already wears.</h1>
            <p className="lede">
              Upload a photo in daylight, no filter, face centred. We'll read your undertone,
              depth, and clarity — then hand you a palette built around what's actually there.
            </p>

            <div className="upload-wrap">
              <button
                className={`dropzone ${dragOver ? "dz-active" : ""}`}
                onClick={() => fileInputRef.current && fileInputRef.current.click()}
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={onDrop}
                aria-label="Upload a photo for colour analysis"
              >
                <div className="oval-shell">
                  <div className="oval-frame">
                    <span style={{ fontFamily: "IBM Plex Mono, monospace", fontSize: 11, color: "#9B8F7A", letterSpacing: "0.08em" }}>
                      DROP OR CLICK
                    </span>
                  </div>
                </div>
                <div className="dz-hint">
                  <strong>Natural light. No makeup filter.</strong><br/>
                  Centre your face inside the oval.
                </div>
              </button>
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                style={{ display: "none" }}
                onChange={(e) => handleFile(e.target.files && e.target.files[0])}
              />
            </div>
          </React.Fragment>
        )}

        {stage === "analyzing" && (
          <div className="upload-wrap">
            <div className="oval-shell">
              <div className="oval-frame" style={{ position: "relative" }}>
                {imageSrc && <img src={imageSrc} alt="Uploaded" />}
                <div className="scan-line" />
              </div>
            </div>
            <div className="analyzing-caption">Reading undertone, depth, and clarity<span className="pulse-dot" /></div>
          </div>
        )}

        {stage === "result" && season && (
          <div className="result-grid">
            <div className="portrait-col">
              <div className="drape-blob" style={{ background: activeSwatch ? activeSwatch.hex : season.accent }} />
              <div className="portrait-card">
                <div className="oval-shell" style={{ width: 280, height: 373 }}>
                  <div className="oval-frame" style={{ borderColor: season.accent }}>
                    {imageSrc && <img src={imageSrc} alt="Your photo" />}
                  </div>
                </div>
                <div className="drape-caption">
                  Draping — <b>{activeSwatch ? activeSwatch.name : ""}</b>
                </div>
              </div>

              {metrics && (
                <div className="metrics">
                  <Meter left="Cool" right="Warm" value={metrics.warmthScore} accent={season.accent} />
                  <Meter left="Light" right="Deep" value={metrics.depthScore} accent={season.accent} />
                  <Meter left="Muted" right="Clear" value={metrics.chromaScore} accent={season.accent} />
                </div>
              )}
            </div>

            <div>
              <div className="season-eyebrow">Your season</div>
              <h1 className="season-name" style={{ color: season.accent }}>{depthLabel} {season.name}</h1>
              <div className="season-tagline">{season.tagline}</div>
              <p className="season-desc">{season.description}</p>

              <div className="section-label">Your palette — tap a swatch to drape it</div>
              <div className="swatch-grid">
                {season.palette.map((c) => (
                  <button
                    key={c.hex}
                    className={`swatch ${activeSwatch && activeSwatch.hex === c.hex ? "active" : ""}`}
                    style={{ background: c.hex }}
                    onClick={() => setActiveSwatch(c)}
                    aria-label={c.name}
                  >
                    <span className="swatch-name">{c.name}</span>
                  </button>
                ))}
              </div>

              <div className="section-label">Colours to let go of</div>
              <div className="avoid-row">
                {season.avoid.map((c) => (
                  <div className="avoid-chip" key={c.hex}>
                    <div className="avoid-swatch" style={{ background: c.hex }} />
                    <span className="avoid-name">{c.name}</span>
                  </div>
                ))}
              </div>
              <div className="avoid-note">{season.avoidNote}</div>

              <div className="disclaimer">
                This is a playful, photo-based read — camera colour balance, lighting, and makeup
                can all shift the result. Treat it as a starting point, not a verdict. For a
                precise read, drape with a professional under neutral daylight.
              </div>
            </div>
          </div>
        )}

        <canvas ref={canvasRef} style={{ display: "none" }} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ColourLab />);
</script>
